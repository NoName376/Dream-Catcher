<div class="settings-page">
  <div class="settings-container">
    <h2>Settings</h2>
    
    <div class="settings-section">
      <h3>Privacy</h3>
      <div class="setting-item">
        <div class="setting-info">
          <span class="label">Private Account</span>
          <span class="description">Hide your posts from the general feed. Only you will see them on your profile.</span>
        </div>
        <button 
          class="toggle-btn" 
          [class.active]="user()?.is_private"
          (click)="onTogglePrivacy()"
        >
          <div class="toggle-slider"></div>
        </button>
      </div>
    </div>
  </div>
</div>
