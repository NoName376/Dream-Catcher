<div class='bookmarks-page'>
  <div class='page-header'>
    <h1>Saved Dreams</h1>
    <p>Collective visions you've chosen to preserve</p>
  </div>

  <div class='bookmarks-list'>
    <app-post-card 
      *ngFor='let post of posts(); trackBy: trackById' 
      [post]='post'
      (liked)='initialLoad()'
      (bookmarked)='initialLoad()'
    ></app-post-card>

    <div #scrollTracker class='scroll-anchor'>
      <div *ngIf='isLoading()' class='loading-indicator'> ✨ manifesting...</div>
    </div>

    <div *ngIf='!posts().length && !isLoading()' class='empty-state'>
      You haven't preserved any dreams yet.
    </div>
  </div>
</div>
