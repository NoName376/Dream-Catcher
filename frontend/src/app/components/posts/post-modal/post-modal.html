<dialog #dialog class="dream-dialog" (click)="onBackdropClick($event)">
  <div class="modal-content">
    <header class="modal-header">
      <div class="header-left">
        <h2 class="modal-title">{{ post().title || 'Untitled Dream' }}</h2>
        <div class="modal-meta">
          <span class="author">@{{ post().author_username }}</span>
          <span class="dot">·</span>
          <span class="category">{{ post().category }}</span>
        </div>
      </div>
      
      <div class="header-right">
        <div class="options-container">
          <button class="options-btn" (click)="toggleMenu($event)">⋮</button>
          @if (showMenu()) {
            <div class="options-menu" (click)="$event.stopPropagation()">
              <button class="menu-item" (click)="onExport($event)">Export to PDF</button>
              @if (isOwner) {
                <button class="menu-item delete" (click)="openDeleteModal($event)">Delete Dream</button>
              }
            </div>
          }
        </div>
        <button class="close-btn" (click)="close()">×</button>
      </div>
    </header>

    <div class="modal-body">
      <div class="hashtags" *ngIf="post().hashtag_names.length">
        @for (tag of post().hashtag_names; track tag) {
          <span class="tag">#{{ tag }}</span>
        }
      </div>
      <p class="content-text">{{ post().content }}</p>
    </div>

    <footer class="modal-footer">
      <div class="footer-left">
        <app-like-button [post]="post()" />
        <app-save-button [post]="post()" />
      </div>
    </footer>
  </div>

  @if (isDeleteModalOpen()) {
    <app-delete-confirm-modal 
      [postId]="post().id" 
      [postTitle]="post().title"
      (close)="closeDeleteModal()"
      (deleted)="onDeleteSuccess()"
    />
  }
</dialog>
