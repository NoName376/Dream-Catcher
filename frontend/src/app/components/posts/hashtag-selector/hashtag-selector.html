<div class='hashtag-selector'>
  <div class='selected-tags' *ngIf='selectedHashtags().length'>
    <span *ngFor='let tag of selectedHashtags()' class='tag-pill'>
      #{{ tag }}
      <button (click)='removeHashtag(tag)' class='remove-btn'>×</button>
    </span>
  </div>

  <div class='input-container'>
    <input
      type='text'
      [(ngModel)]='hashtagInput'
      (keydown.enter)='onEnter(); $event.preventDefault()'
      placeholder='Add dream keys (max 7)...'
      [disabled]='selectedHashtags().length >= maxTags'
    />
    <button 
      class='add-tag-btn' 
      (click)='onEnter()'
      [disabled]='!hashtagInput().trim() || selectedHashtags().length >= maxTags'
    >
      Add
    </button>
  </div>

  <div class='suggestions' *ngIf='suggestions().length && selectedHashtags().length < maxTags'>
    <span class='label'>Popular:</span>
    <button 
      *ngFor='let tag of suggestions()' 
      (click)='addHashtag(tag.name)'
      class='suggestion-pill'
      [disabled]='selectedHashtags().includes(tag.name)'
    >
      #{{ tag.name }}
    </button>
  </div>
</div>
