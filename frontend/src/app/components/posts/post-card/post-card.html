<article class="post-card">
  <div class="post-card-inner">
    <div class="card-top">
      <h3 class="dream-title">{{ post().title || 'Untitled Dream' }}</h3>
      <span class="author">@{{ post().author_username }}</span>

      @if (post().hashtag_names.length) {
        <div class="hashtags">
          @for (tag of post().hashtag_names; track tag) {
            <span class="tag">#{{ tag }}</span>
          }
        </div>
      }

      <p class="dream-text">{{ post().content }}</p>
    </div>

    <div class="card-bottom">
      <button class="read-more-btn" (click)="openModal()">Читать полностью</button>

      <div class="actions">
        <app-like-button [post]="livePost()" />
        <app-save-button [post]="livePost()" />
      </div>
    </div>
  </div>
</article>

@if (isModalOpen()) {
  <app-post-modal [post]="livePost()" (closed)="closeModal()" />
}
