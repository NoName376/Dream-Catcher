<article class='post-card'>
  <div class='post-header'>
    <div class='author-info'>
      <div class='meta'>
        <span class='username'>@{{ post().author_username }}</span>
        <span class='timestamp'>{{ post().created_at | date:'short' }}</span>
      </div>
    </div>
  </div>

  <div class="post-content">
    <p>{{ post().content }}</p>
    <div class='hashtags' *ngIf='post().hashtag_names.length'>
      <span *ngFor='let tag of post().hashtag_names' class='tag'>#{{ tag }}</span>
    </div>
  </div>

  <div class='post-footer'>
    <button 
      class='interaction-btn like' 
      [class.active]='post().is_liked'
      (click)='onLike()'
    >
      <span class='icon'>{{ post().is_liked ? '💖' : '🤍' }}</span>
      <span class='count'>{{ post().likes_count }}</span>
    </button>

    <button 
      class='interaction-btn bookmark' 
      [class.active]='post().is_bookmarked'
      (click)='onBookmark()'
    >
      <span class='icon'>{{ post().is_bookmarked ? '🔖' : '📑' }}</span>
    </button>
  </div>
</article>
