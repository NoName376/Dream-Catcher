<article class='post-card'>
  <div class='post-header'>
    <div class='author-info'>
      <div class='meta'>
        <span class='username'>@{{ post().author_username }}</span>
        <span class='date'>{{ post().created_at | date:'short' }}</span>
      </div>
    </div>
    <button class="bookmark-btn" [class.active]="post().isBookmarked" (click)="onBookmark()">
      <span class="icon">{{ post().isBookmarked ? '🔖' : '📑' }}</span>
    </button>
  </div>

  <div class="post-content">
    <p>{{ post().content }}</p>
    <div class='hashtags' *ngIf='post().hashtag_names.length'>
      <span *ngFor='let tag of post().hashtag_names' class='hashtag'>#{{ tag }}</span>
    </div>
  </div>

  <div class='post-actions'>
    <button 
      class='action-btn like' 
      [class.active]='post().is_liked'
      (click)='onLike()'
    >
      <span class='icon'>{{ post().is_liked ? '💖' : '🤍' }}</span>
      <span class='count'>{{ post().likes_count }}</span>
    </button>

    <button 
      class='action-btn bookmark' 
      [class.active]='post().is_bookmarked'
      (click)='onBookmark()'
    >
      <span class='icon'>{{ post().is_bookmarked ? '🔖' : '📑' }}</span>
    </button>
  </div>
</article>
