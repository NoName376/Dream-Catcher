<article class='post-card'>
  <div class='post-header'>
    <div class='author-info'>
      <div class='avatar'>{{ post().authorUsername[0].toUpperCase() }}</div>
      <div class='meta'>
        <span class='username'>@{{ post().authorUsername }}</span>
        <span class='date'>{{ post().createdAt | date:'short' }}</span>
      </div>
    </div>
  </div>

  <div class='post-content'>
    <p>{{ post().content }}</p>
    <div class='hashtags' *ngIf='post().hashtagNames.length'>
      <span *ngFor='let tag of post().hashtagNames' class='hashtag'>#{{ tag }}</span>
    </div>
  </div>

  <div class='post-actions'>
    <button 
      class='action-btn like' 
      [class.active]='post().isLiked'
      (click)='onLike()'
    >
      <span class='icon'>{{ post().isLiked ? '💖' : '🤍' }}</span>
      <span class='count'>{{ post().likesCount }}</span>
    </button>

    <button 
      class='action-btn bookmark' 
      [class.active]='post().isBookmarked'
      (click)='onBookmark()'
    >
      <span class='icon'>{{ post().isBookmarked ? '🔖' : '📑' }}</span>
    </button>
  </div>
</article>
