<article class="post-card">
  <div class="post-card-inner">
    @if (post().genre) {
      <span class="genre-badge" [attr.data-genre]="post().genre">{{ post().genre }}</span>
    }

    <div class="card-top">
      <h3 class="dream-title">{{ post().title || 'Untitled Dream' }}</h3>
      <span class="author">@{{ post().author_username }}</span>

      @if (post().hashtag_names.length) {
        <div class="hashtags">
          @for (tag of post().hashtag_names; track tag) {
            <span class="tag">#{{ tag }}</span>
          }
        </div>
      }

      <p class="dream-text">{{ post().content }}</p>
    </div>

    <div class="card-bottom">
      <button class="read-more-btn" (click)="openModal()">Читать полностью</button>

      <div class="actions">
        <app-like-button [post]="livePost()" />
        <app-save-button [post]="livePost()" />
        
        @if (isOwner()) {
          <button class="interaction-btn delete-btn" (click)="onDelete()" title="Удалить">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
          </button>
        }
      </div>
    </div>
  </div>
</article>

@if (isModalOpen()) {
  <app-post-modal [post]="livePost()" (closed)="closeModal()" />
}
