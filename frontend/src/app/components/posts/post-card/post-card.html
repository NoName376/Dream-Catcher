<article class="post-card">
  <div class="post-header">
    <div class="author-info">
      <div class="avatar-placeholder">{{ post().authorUsername[0] | uppercase }}</div>
      <div class="author-meta">
        <span class="username">@{{ post().authorUsername }}</span>
        <span class="timestamp">{{ post().createdAt | date:'short' }}</span>
      </div>
    </div>
    <button class="bookmark-btn" [class.active]="post().isBookmarked" (click)="onBookmark()">
      <span class="icon">{{ post().isBookmarked ? '🔖' : '📑' }}</span>
    </button>
  </div>

  <div class="post-content">
    <p>{{ post().content }}</p>
    <div class="hashtags" *ngIf="post().hashtagNames.length">
      <span *ngFor="let tag of post().hashtagNames" class="tag">#{{ tag }}</span>
    </div>
  </div>

  <div class="post-footer">
    <button class="interaction-btn like-btn" [class.active]="post().isLiked" (click)="onLike()">
      <span class="icon">{{ post().isLiked ? '💖' : '🤍' }}</span>
      <span class="count" *ngIf="post().likesCount > 0">{{ post().likesCount }}</span>
      <span class="label">Like</span>
    </button>
    
    <button class="interaction-btn comment-btn">
      <span class="icon">💭</span>
      <span class="label">Dream Echo</span>
    </button>

    <button class="interaction-btn share-btn">
      <span class="icon">✨</span>
      <span class="label">Manifest</span>
    </button>
  </div>
</article>
