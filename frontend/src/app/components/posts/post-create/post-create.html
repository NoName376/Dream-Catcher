<div class='post-create-card'>
  <input
    type="text"
    [ngModel]="title()"
    (ngModelChange)="title.set($event)"
    placeholder="Dream title..."
    maxlength="500"
    [disabled]="isSubmitting()"
    class="title-input"
  />

  <textarea
    [ngModel]='content()'
    (ngModelChange)='content.set($event)'
    placeholder='Share your dream...'
    rows='3'
    maxlength='5000'
    [disabled]='isSubmitting()'
  ></textarea>

  <div class='tag-selector-container'>
    <app-hashtag-selector (hashtagChanged)='onTagsChanged($event)'></app-hashtag-selector>
    <div class='hashtag-warning' *ngIf='showHashtagWarning()'>
      Please add at least one hashtag to help others find your dream.
    </div>
  </div>

  <div class="category-selector">
    <select [ngModel]="category()" (ngModelChange)="category.set($event)" [disabled]="isSubmitting()">
      <option value="" disabled selected>Select Category *</option>
      @for (cat of categories; track cat.id) {
        <option [value]="cat.id">{{ cat.name }}</option>
      }
    </select>
  </div>

  <div class='footer'>
    <button 
      class='btn-primary' 
      [disabled]='!content().trim() || !title().trim() || !category() || content().length > 5000 || isSubmitting()'
      (click)='onSubmit()'
    >
      <span *ngIf='!isSubmitting()'>Cast Dream</span>
      <span *ngIf='isSubmitting()' class='loader'></span>
    </button>
  </div>
</div>
