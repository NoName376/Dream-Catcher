<div class="feed-page">
  <div class="feed-layout">
    <div class="feed-main">
      <div class="feed-header">
        <h1>Dream Flow</h1>
        <div class="feed-controls">
          <div class="search-box">
            <input 
              type="text" 
              [(ngModel)]="searchQuery" 
              (keyup.enter)="onSearch()"
              placeholder="Search collective dreams..."
            />
            <button (click)="onSearch()" class="search-btn">✨</button>
          </div>

          <div class="sort-filters">
            <button 
              [class.active]="sortMode() === 'newest'" 
              (click)="onSortChange('newest')"
            >Latest</button>
            <button 
              [class.active]="sortMode() === 'popular'" 
              (click)="onSortChange('popular')"
            >Lucid</button>
          </div>
        </div>
      </div>

      <app-post-create></app-post-create>

      <div class="posts-feed">
        <app-post-card 
          *ngFor="let post of posts(); trackBy: trackById" 
          [post]="post"
        ></app-post-card>

        <div #scrollTracker class="infinite-scroll-anchor">
          <div *ngIf="isLoading()" class="dream-loader">
            <div class="sparkles">✨</div>
            <span>Manifesting more dreams...</span>
          </div>
        </div>

        <div *ngIf="!posts().length && !isLoading()" class="void-state">
          <span class="icon">🌌</span>
          <h3>A peaceful void</h3>
          <p>The collective consciousness is quiet. Try searching for other vibes.</p>
        </div>
      </div>
    </div>

    <aside class="feed-sidebar">
      <app-trending-hashtags (hashtagSelected)="onHashtagSelect($event)"></app-trending-hashtags>
      
      <div class="dream-tip">
        <h4>Did you know?</h4>
        <p>Your dreams are shared threads in the tapestry of the universe. Be kind to other manifestors.</p>
      </div>
    </aside>
  </div>
</div>
