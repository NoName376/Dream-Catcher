<div class='feed-page'>
  <div class='feed-container'>
    <div class='feed-controls'>
      <div class='search-bar'>
        <input 
          type='text' 
          [(ngModel)]='searchQuery' 
          (keyup.enter)='onSearch()'
          placeholder='Filter by #hashtags...'
        />
        <button (click)='onSearch()' class='search-btn'>🔍</button>
      </div>

      <div class='sort-toggle'>
        <button 
          [class.active]="sortMode() === 'newest'" 
          (click)="onSortChange('newest')"
        >✨ Newest</button>
        <button 
          [class.active]="sortMode() === 'popular'" 
          (click)="onSortChange('popular')"
        >🔥 Popular</button>
      </div>
    </div>

    <app-post-create></app-post-create>

    <div class='posts-list'>
      <app-post-card 
        *ngFor='let post of posts(); trackBy: trackById' 
        [post]='post'
        (liked)='initialLoad()'
        (bookmarked)='initialLoad()'
      ></app-post-card>

      <div #scrollTracker class='scroll-anchor'>
        <div *ngIf='isLoading()' class='loading-indicator'>
          <span class='sparkle'>✨</span>Manifesting more dreams...
        </div>
      </div>

      <div *ngIf='!posts().length && !isLoading()' class='empty-state'>
        No dreams found matching your search or sort criteria.
      </div>
    </div>
  </div>
</div>
