<div class='feed-page'>
  <div class='feed-container'>
    <div class='search-bar'>
      <input 
        type='text' 
        [(ngModel)]='searchQuery' 
        (keyup.enter)='onSearch()'
        placeholder='Search dreams by #hashtags...'
      />
      <button (click)='onSearch()' class='search-btn'>🔍</button>
    </div>

    <app-post-create></app-post-create>

    <div class='posts-list'>
      @defer (on viewport) {
        <app-post-card 
          *ngFor='let post of posts(); trackBy: trackById' 
          [post]='post'
          (liked)='loadPosts()'
          (bookmarked)='loadPosts()'
        ></app-post-card>

        <div *ngIf='!posts().length && !isLoading()' class='empty-state'>
          No dreams found Matching these keys.
        </div>
      } @placeholder {
        <div class='loading-spinner'>✨ Manifesting dreams...</div>
      }
    </div>
  </div>
</div>
